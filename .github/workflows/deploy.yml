name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-bulk-fhir:
    name: Deploy bulk-fhir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-phoenix:
    name: Deploy Phoenix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.phoenix.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
