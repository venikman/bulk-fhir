# fly.toml app configuration file generated for bulk-fhir on 2026-03-18T03:47:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bulk-fhir'
primary_region = 'iad'

[build]

[env]
  OTEL_EXPORTER_OTLP_ENDPOINT = "https://fhir-copilot-phoenix.fly.dev"
  OTEL_EXPORTER_OTLP_PROTOCOL = "http/protobuf"
  OTEL_SERVICE_NAME = "bulk-fhir"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
